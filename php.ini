; Local PHP Configuration for HEIC to JPG Converter
; This file overrides default PHP settings for local development

; File Upload Settings
upload_max_filesize = 10M
post_max_size = 10M
max_file_uploads = 20

; Execution Settings
max_execution_time = 300
memory_limit = 256M

; Error Reporting (for development)
display_errors = On
log_errors = On
error_reporting = E_ALL

; Session Settings
session.gc_maxlifetime = 3600
session.cookie_lifetime = 0 